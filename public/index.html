<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificado Eventos UN</title>
  <script src="https://cdn.tailwindcss.com"></script>
    <style>
    .my-bg {
      background-image:
        linear-gradient(135deg, rgba(0,0,0,0.82) 0%, rgba(0,43,92,0.75) 100%),
        url('https://fcen.unal.edu.co/fileadmin/imagenes/fotos_paginas_programas/wpatio.jpg');
      background-size: cover;
      background-position: center;
    }

    .card {
      border-top: 4px solid #002B5C;
    }

    .spinner {
      display: inline-block;
      width: 1.1rem; height: 1.1rem;
      border: 2px solid rgba(0,43,92,0.25);
      border-top-color: #002B5C;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-6px); }
      40%,80%  { transform: translateX(6px); }
    }
    .shake { animation: shake 0.4s ease; }

    select, input[type="text"] {
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    select:focus, input[type="text"]:focus {
      border-color: #002B5C;
      box-shadow: 0 0 0 3px rgba(0,43,92,0.15);
      outline: none;
    }
  </style>
</head>

<body class="my-bg min-h-screen flex items-center justify-center py-10">

  <div class="bg-white card p-8 rounded-2xl shadow-2xl w-full max-w-md">

  <!-- Logo FCEN -->
  <div class="flex justify-center mb-7">
    <img
      src="https://fcen.unal.edu.co/fileadmin/Eventos/certificados/fcen.png"
      alt="Facultad de Ciencias Exactas y Naturales"
      class="w-72 h-16 object-contain"
      onerror="this.style.display='none'"
    />
  </div>

  <h1 class="text-xl font-bold text-center text-gray-800 mb-1 tracking-tight">
    Descarga tu Certificado
  </h1>  

  <!-- Selector de evento -->
  <label for="eventoSelect" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">
    Evento
  </label>
  <select
    id="eventoSelect"
    disabled
    class="w-full px-4 py-2.5 border border-gray-200 rounded-lg bg-gray-50
           text-sm text-gray-700 mb-4 disabled:cursor-not-allowed"
  >
    <option value="">— Cargando eventos… —</option>
  </select>

  <!-- Input cédula -->
  <label for="cedulaInput" class="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1">
    Número de documento
  </label>
  <input
    id="cedulaInput"
    type="text"
    placeholder="1004321987"
    class="w-full px-4 py-2.5 border border-gray-200 rounded-lg text-sm text-gray-700 mb-5"
  />

  <!-- Botón buscar -->
  <button
    id="btnBuscar"
    onclick="buscarCedula()"
    class="w-full bg-[#002B5C] hover:bg-[#003f85] active:bg-[#001f42]
           text-white text-sm font-semibold py-2.5 rounded-lg transition duration-200
           disabled:opacity-50 disabled:cursor-not-allowed"
  >
    Buscar y descargar
  </button>

  <!-- Mensajes -->
  <div id="msgGenerando" class="mt-5 hidden text-center text-[#002B5C] text-sm font-medium">
    <span class="spinner"></span>Generando certificado…
  </div>

  <div id="msgNoEncontrado" class="mt-5 hidden">
    <p class="text-red-500 text-center text-sm font-medium bg-red-50 border border-red-200 rounded-lg p-3">
      No se encontró registro con ese documento en el evento seleccionado.
    </p>
  </div>

  <div id="msgSinEvento" class="mt-5 hidden">
    <p class="text-amber-600 text-center text-sm font-medium bg-amber-50 border border-amber-200 rounded-lg p-3">
      Por favor selecciona un evento antes de buscar.
    </p>
  </div>

  <div id="msgError" class="mt-5 hidden">
    <p class="text-red-600 text-center text-sm font-medium bg-red-50 border border-red-200 rounded-lg p-3">
      Ocurrió un error al generar el certificado. Intenta de nuevo.
    </p>
  </div>

  <div class="mt-7 text-center">
    <small class="text-gray-400 text-xs">
      ¿Problemas? 
      <a href="mailto:comunicacionesfcen_man@unal.edu.co"
        class="text-gray-500 font-medium hover:text-[#002B5C] underline transition duration-200">
        comunicacionesfcen_man@unal.edu.co
      </a>
    </small>
  </div>
</div>

  <!-- ══════════════════════════════════════════════════════════════════
       LÓGICA PRINCIPAL
  ══════════════════════════════════════════════════════════════════ -->
  <script>
    // ── URL del Google Sheet publicado como CSV ──────────────────────
    const SHEET_URL = 
      'https://docs.google.com/spreadsheets/d/e/2PACX-1vTqE-3NMFdjG0TG_4LBVs65PUVo4SPHy0hK3IUa04Oe37NAu5Em_lQawdyCIMuAWw/pub?output=csv';

    // ── Base de datos en memoria: { 'Nombre Evento': [{nombre,documento,rol}] }
    let db = {};

    // ── Participante encontrado (se guarda para reutilizar en descarga)
    let participanteActual = null;
    let eventoActual       = null;

    function parseCSV(text) {
      // Normalizar saltos de línea y separar filas
      const rows = text
        .replace(/\r\n/g, '\n')
        .replace(/\r/g, '\n')
        .split('\n')
        .map(r => r.split(','));

      if (rows.length < 3) return {};

      const eventRow = rows[0];
      const result   = {};

      // Detectar columnas de inicio de cada evento
      const eventCols = [];
      for (let col = 0; col < eventRow.length; col += 3) {
        const name = (eventRow[col] || '').trim();
        if (name) {
          eventCols.push({ name, col });
          result[name] = [];
        }
      }

      // Rellenar participantes desde fila 2 en adelante
      for (let row = 2; row < rows.length; row++) {
        for (const ev of eventCols) {
          const nombre    = (rows[row][ev.col]     || '').trim();
          const documento = (rows[row][ev.col + 1] || '').trim();
          const rol       = (rows[row][ev.col + 2] || 'Asistente').trim();

          if (nombre) {
            result[ev.name].push({ nombre, documento, rol });
          }
        }
      }

      return result;
    }

    // ── Normalización de documento (quita "CC " al inicio, espacios)
    function normDoc(d) {
      return (d || '').replace(/^CC\s*/i, '').replace(/\s/g, '').toLowerCase();
    }

    // ────────────────────────────────────────────────────────────────
    // Carga inicial
    // ────────────────────────────────────────────────────────────────
    async function cargarDatos() {      
      const select   = document.getElementById('eventoSelect');

      try {
        const resp = await fetch(SHEET_URL);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const text = await resp.text();
        db = parseCSV(text);

        // Poblar selector
        select.innerHTML = '<option value="">— Selecciona un evento —</option>';
        for (const nombre of Object.keys(db)) {
          const opt = document.createElement('option');
          opt.value       = nombre;
          opt.textContent = nombre;
          select.appendChild(opt);
        }

        select.disabled        = false;        
      } catch (err) {
        console.error(err);
        select.innerHTML     = '<option value="">Error al cargar eventos</option>';
      }
    }

    // ────────────────────────────────────────────────────────────────
    // Búsqueda
    // ────────────────────────────────────────────────────────────────
    function ocultarMensajes() {
      ['msgGenerando','msgNoEncontrado','msgSinEvento','msgError']
        .forEach(id => document.getElementById(id).classList.add('hidden'));
    }

    function mostrar(id) {
      document.getElementById(id).classList.remove('hidden');
    }

    function buscarCedula() {
      ocultarMensajes();
      participanteActual = null;
      eventoActual       = null;

      const evento = document.getElementById('eventoSelect').value;
      const cedula = document.getElementById('cedulaInput').value.trim();

      if (!evento) { mostrar('msgSinEvento'); return; }
      if (!cedula) {
        const input = document.getElementById('cedulaInput');
        input.classList.add('border-red-400', 'shake');
        setTimeout(() => input.classList.remove('shake'), 500);
        return;
      }

      const lista        = db[evento] || [];
      const normalizado  = normDoc(cedula);
      const participante = lista.find(p => normDoc(p.documento) === normalizado);

      if (!participante) {
        mostrar('msgNoEncontrado');
        return;
      }

      participanteActual = participante;
      eventoActual       = evento;
      descargar();          // ← descarga automática directa
    }

    // ────────────────────────────────────────────────────────────────
    // Descarga del PDF
    // ────────────────────────────────────────────────────────────────
    async function descargar() {
      if (!participanteActual || !eventoActual) return;

      ocultarMensajes();
      mostrar('msgGenerando');

      const btn = document.getElementById('btnBuscar');
      btn.disabled = true;

      try {
        const resp = await fetch('/api/certificado', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            nombre:    participanteActual.nombre,
            cedula:    participanteActual.documento,
            rol:       participanteActual.rol,
            eventoKey: eventoActual,
          }),
        });

        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          throw new Error(err.error || 'Error ' + resp.status);
        }

        const blob = await resp.blob();
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = `certificado_${participanteActual.documento}.pdf`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 10_000);

        ocultarMensajes();   // limpia el spinner, queda todo listo para otra búsqueda
      } catch (err) {
        console.error(err);
        ocultarMensajes();
        mostrar('msgError');
      } finally {
        btn.disabled = false;
      }
    }

    // ── Permitir búsqueda con Enter ──────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      cargarDatos();
      document.getElementById('cedulaInput')
        .addEventListener('keydown', e => { if (e.key === 'Enter') buscarCedula(); });
    });
  </script>
</body>
</html>
