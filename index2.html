<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificado Eventos UN</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<style>
  .my-bg {
    background-image: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.5)),
      url('https://fcen.unal.edu.co/fileadmin/imagenes/fotos_paginas_programas/wpatio.jpg');
    background-size: cover;
    background-position: center;
  }
</style>

<body class="my-bg min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
    <!-- Placeholder para icono -->
    <div class="flex justify-center mb-6">
      <img src="./fcen.png" alt="Icono evento" class="w-80 h-20 object-contain" onerror="this.style.display='none'">
    </div>

    <h1 class="text-2xl font-bold text-center text-gray-800 mb-4">Descargar Certificado</h1>

    <!-- Selector de evento -->
    <label for="eventoSelect" class="block text-sm font-medium text-gray-700 mb-2">Selecciona el evento:</label>
    <select id="eventoSelect"
      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4">
      <option value="">-- Selecciona un evento --</option>
      <option value="biomat">Biomat 2025</option>
      <option value="cifte">Congreso de Física y Tecnologías Emergentes</option>
      <option value="encuentromat">Encuentro de Matemáticas</option>
      <option value="innobio">Simposio Innobio</option>
      <option value="estadistica">Workshop de Estadística</option>
      <option value="computacion">Workshop en Ciencias de la Computación</option>
    </select>

    <!-- Input de cédula -->
    <input id="cedulaInput" type="text" placeholder="Número de cédula"
      class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4" />

    <button onclick="buscarCedula()"
      class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-md transition duration-300">
      Buscar
    </button>

    <!-- Resultados -->
    <div id="resultado" class="mt-6 hidden">
      <p class="text-green-600 text-center font-medium mb-4">¡Gracias por tu participación!</p>
      <a id="downloadLink" href="#" download target="_blank"
        class="block text-center text-white hover:bg-green-600  bg-green-500 font-semibold p-4 border rounded-md transition duration-300">
        🔽 DESCARGAR CERTIFICADO
      </a>
    </div>

    <div id="noEncontrado" class="mt-6 hidden">
      <p class="text-red-600 text-center font-medium">No se encontró registro con ese número de cédula.</p>
    </div>

    <div id="eventoNoSeleccionado" class="mt-6 hidden">
      <p class="text-yellow-600 text-center font-medium">Por favor, selecciona un evento antes de buscar.</p>
    </div>

    <div class="mt-6 leading-tight text-center">
      <small class="text-gray-500 text-center mb-4 leading-tight mt-8">Si tienes problemas para descargar el certificado, contacta a soporte: <strong>comunicacionesfcen_man@unal.edu.co</strong></small>
    </div>
  </div>

  <script>
    // Datos simulados de participantes por evento
    let db = {};

    // Cargar el archivo JSON al iniciar la página
    fetch('data.json')
      .then(response => response.json())
      .then(data => { db = data; })
      .catch(error => {
        alert("No se pudo cargar la base de datos de participantes.");
        console.error(error);
      });

    function buscarCedula() {
      const evento = document.getElementById("eventoSelect").value;
      const cedula = document.getElementById("cedulaInput").value.trim();
      const resultadoDiv = document.getElementById("resultado");
      const noEncontradoDiv = document.getElementById("noEncontrado");
      const eventoNoSeleccionadoDiv = document.getElementById("eventoNoSeleccionado");
      const link = document.getElementById("downloadLink");

      // Reiniciar estados
      resultadoDiv.classList.add("hidden");
      noEncontradoDiv.classList.add("hidden");
      eventoNoSeleccionadoDiv.classList.add("hidden");

      if (!evento) {
        eventoNoSeleccionadoDiv.classList.remove("hidden");
        return;
      }

      if (!cedula) {
        alert("Por favor ingrese su número de cédula.");
        return;
      }

      const listaParticipantes = db[evento];
      const participante = listaParticipantes.find(p => p.cedula === cedula);

      if (participante) {
        link.href = participante.certificadoUrl;
        resultadoDiv.classList.remove("hidden");
      } else {
        noEncontradoDiv.classList.remove("hidden");
      }
    }
  </script>
</body>

</html>
